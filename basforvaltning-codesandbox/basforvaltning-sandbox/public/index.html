<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Basförvaltning – Uppskattningsverktyg</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; }
      input, textarea, select, button {
        font-family: inherit;
        font-size: 13px;
        outline: none;
      }
      input, textarea {
        width: 100%;
        padding: 8px 11px;
        border: 1px solid #d1d9e6;
        border-radius: 8px;
        color: #0f1f3d;
        background: #fff;
        transition: border-color 0.2s;
      }
      input:focus, textarea:focus { border-color: #00b4a6; }
      button {
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid #d1d9e6;
        background: #fff;
        padding: 8px 14px;
        color: #0f1f3d;
        transition: all 0.15s;
      }
      button:hover { background: #f0f4f8; }
      textarea { resize: vertical; }
      @keyframes bounce {
        0%,100%{transform:translateY(0);opacity:.5}
        50%{transform:translateY(-4px);opacity:1}
      }
      @keyframes fadeIn {
        from{opacity:0;transform:translateY(6px)}
        to{opacity:1;transform:translateY(0)}
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #d1d9e6; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
